name: Code Review

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'PR number to review'
        type: number
        required: true

jobs:
  check-review-status:
    name: Review Status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      review_round: ${{ steps.check.outputs.review_round }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if review should run
        id: check
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ inputs.pr_number }};

            // Skip review for docs/config-only changes
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const ignoredPatterns = [
              /\.md$/,
              /^docs\//,
              /^\.github\//,
              /\.json$/,
              /\.ya?ml$/,
              // Artefatos de avaliação — gerados por harness, não faz sentido
              // revisar linha a linha (e estouram o budget de contexto).
              /\.raw\.jsonl$/,
              /^probes\//,
            ];
            const hasCodeChanges = files.some(f => !ignoredPatterns.some(p => p.test(f.filename)));
            if (!hasCodeChanges) {
              console.log('Only docs/config files changed. Skipping review.');
              core.setOutput('should_run', 'false');
              core.setOutput('review_round', 'skip');
              return;
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const round1Marker = comments.data.some(c => c.body?.includes('<!-- CLAUDE_REVIEW_ROUND_1 -->'));
            const round2Marker = comments.data.some(c => c.body?.includes('<!-- CLAUDE_REVIEW_ROUND_2_COMPLETE -->'));

            if (round2Marker) {
              console.log('Round 2 review already completed. Skipping further reviews.');
              core.setOutput('should_run', 'false');
              core.setOutput('review_round', 'complete');
              return;
            }

            if (round1Marker) {
              console.log('Round 1 review completed. Running Round 2 on new changes only.');
              core.setOutput('should_run', 'true');
              core.setOutput('review_round', '2');
              return;
            }

            console.log('No previous review found. Running Round 1.');
            core.setOutput('should_run', 'true');
            core.setOutput('review_round', '1');

  claude-review:
    name: Claude Review
    needs: check-review-status
    if: needs.check-review-status.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Setup PATH for nvm
        run: |
          for dir in "$HOME/.nvm/versions/node"/*/bin /usr/local/bin /usr/bin; do
            if [ -x "$dir/node" ]; then
              echo "$dir" >> $GITHUB_PATH
              echo "Found Node at: $dir"
              break
            fi
          done

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR info and build diff
        id: pr
        run: |
          PR_NUMBER=${{ inputs.pr_number }}
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

          HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid -q .headRefOid)
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT

          BASE_SHA=$(gh pr view "$PR_NUMBER" --json baseRefOid -q .baseRefOid)
          echo "base_sha=$BASE_SHA" >> $GITHUB_OUTPUT

          # Exclusões de pathspec: artefatos de avaliação (raw.jsonl, probes/)
          # são gerados pelo harness e não fazem sentido em diff review; também
          # estouram o budget de contexto do revisor em PRs com reruns extensos.
          DIFF_EXCLUDES=(
            ':(exclude,glob)**/*.raw.jsonl'
            ':(exclude,glob)probes/**'
          )

          if [ "${{ needs.check-review-status.outputs.review_round }}" = "2" ]; then
            gh pr view "$PR_NUMBER" --json commits -q '.commits[0].oid' > first_commit.txt
            FIRST_COMMIT=$(cat first_commit.txt)
            git diff "$FIRST_COMMIT"..HEAD -- "${DIFF_EXCLUDES[@]}" > pr.diff
            echo "Review scope: Changes since first review commit"
          else
            git diff "$BASE_SHA..$HEAD_SHA" -- "${DIFF_EXCLUDES[@]}" > pr.diff
            echo "Review scope: Full PR diff"
          fi

          gh pr view "$PR_NUMBER" --json files -q '.files[].path' \
            | grep -vE '\.raw\.jsonl$|^probes/' > changed_files.txt || true
          echo "Changed files (após exclusão de raw.jsonl/probes):"
          cat changed_files.txt

          DIFF_SIZE=$(wc -c < pr.diff)
          MAX_DIFF_SIZE=150000
          echo "Diff size: $DIFF_SIZE bytes"
          if [ "$DIFF_SIZE" -gt "$MAX_DIFF_SIZE" ]; then
            echo "::warning::Diff exceeds ${MAX_DIFF_SIZE} bytes, truncating to fit context window"
            head -c "$MAX_DIFF_SIZE" pr.diff > pr.diff.tmp
            mv pr.diff.tmp pr.diff
            echo "DIFF_TRUNCATED=true" >> $GITHUB_OUTPUT
          else
            echo "DIFF_TRUNCATED=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run Claude review via Bedrock
        run: |
          REVIEW_ROUND="${{ needs.check-review-status.outputs.review_round }}"

          node << 'SCRIPT'
          const fs = require('fs');

          const round = process.env.REVIEW_ROUND;
          const diffTruncated = process.env.DIFF_TRUNCATED === 'true';
          const promptFile = `${process.env.HOME}/.config/claude/prompts/pr-review.md`;

          let systemPrompt = 'You are a senior software engineer performing a code review. Analyze the PR diff carefully and provide actionable, specific feedback. Focus on bugs, security issues, performance problems, and code quality.';
          if (fs.existsSync(promptFile)) {
            systemPrompt = fs.readFileSync(promptFile, 'utf8');
          } else {
            console.log(`Warning: No prompt file at ${promptFile}, using default prompt`);
          }

          const diff = fs.readFileSync('pr.diff', 'utf8');
          const changedFiles = fs.readFileSync('changed_files.txt', 'utf8').trim();

          const parts = [
            `Review Round: ${round}`,
            '',
            '## Files changed in this PR',
            'These are the ONLY files modified in this PR. Do NOT reference any other files in your feedback:',
            changedFiles,
            '',
          ];

          if (diffTruncated) {
            parts.push(
              '> **Note**: The diff was truncated due to size. Review only the code shown below.',
              ''
            );
          }

          parts.push(
            '## Diff',
            '',
            '```diff',
            diff,
            '```',
            '',
            'Respond with ONLY a valid JSON object (no markdown fences, no extra text, no explanation).',
            'Use this exact structure:',
            '{',
            '  "summary": "Brief summary of the changes and their purpose",',
            '  "changes": ["Key change 1", "Key change 2"],',
            '  "feedback": [',
            '    {"file": "path/to/file.ts", "line": 42, "comment": "Your suggestion here"}',
            '  ]',
            '}',
            '',
            'Rules:',
            '- The "file" field MUST be one of the files listed above in "Files changed in this PR". Never reference files outside this list.',
            '- The "line" field MUST reference a line number from the NEW version of the file (right side of diff, lines with + prefix). Cross-check line numbers against the @@ hunk headers.',
            '- Only include feedback for actual issues: bugs, security problems, performance issues, or significant code quality concerns.',
            '- Do NOT include nitpicks, style preferences, or suggestions to add comments/documentation.',
            '- Do NOT hallucinate methods, functions, or variables that are not visible in the diff. Only reference code that is explicitly shown.',
            '- If there are no issues, return an empty feedback array.',
            '- Keep comments concise and actionable.',
          );

          const userMessage = parts.join('\n');

          const request = {
            anthropic_version: 'bedrock-2023-05-31',
            max_tokens: 8192,
            system: systemPrompt,
            messages: [{ role: 'user', content: userMessage }],
          };

          fs.writeFileSync('/tmp/bedrock-request.json', JSON.stringify(request));
          console.log(`Request built (diff: ${diff.length} chars, files: ${changedFiles.split('\n').length}, round: ${round})`);
          SCRIPT

          aws bedrock-runtime invoke-model \
            --model-id us.anthropic.claude-opus-4-6-v1 \
            --content-type application/json \
            --accept application/json \
            --body fileb:///tmp/bedrock-request.json \
            /tmp/bedrock-response.json

          node -e "
            const fs = require('fs');
            const resp = JSON.parse(fs.readFileSync('/tmp/bedrock-response.json', 'utf8'));
            const text = resp.content[0].text;
            fs.writeFileSync('review.json', text);
            const usage = resp.usage || {};
            fs.writeFileSync('review-usage.json', JSON.stringify(usage));
            console.log('Review output:');
            console.log(text.substring(0, 500) + (text.length > 500 ? '...' : ''));
            console.log('Token usage:', JSON.stringify(usage));
          "
        env:
          REVIEW_ROUND: ${{ needs.check-review-status.outputs.review_round }}
          DIFF_TRUNCATED: ${{ steps.pr.outputs.DIFF_TRUNCATED }}

      - name: Post review
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const prNumber = ${{ steps.pr.outputs.number }};
            const headSha = '${{ steps.pr.outputs.head_sha }}';
            const reviewRound = '${{ needs.check-review-status.outputs.review_round }}';

            let usage = { input_tokens: 0, output_tokens: 0 };
            try {
              usage = JSON.parse(fs.readFileSync('review-usage.json', 'utf8'));
            } catch (e) {
              console.log('Warning: Could not read token usage');
            }
            const inputCost = (usage.input_tokens / 1_000_000) * 5;
            const outputCost = (usage.output_tokens / 1_000_000) * 25;
            const totalCost = inputCost + outputCost;

            const rawOutput = fs.readFileSync('review.json', 'utf8').trim();
            console.log('Raw Claude output:', rawOutput);

            let review;
            try {
              let jsonStr = rawOutput;
              if (jsonStr.startsWith('```')) {
                jsonStr = jsonStr.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '');
              }
              review = JSON.parse(jsonStr);
            } catch (e) {
              console.log('JSON parse failed:', e.message);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## Claude Review (Round ${reviewRound})\n\n${rawOutput}\n\n---\n*Automated review by Claude Opus 4.6 | ${usage.input_tokens.toLocaleString()} in / ${usage.output_tokens.toLocaleString()} out | $${totalCost.toFixed(4)}*`
              });
              return;
            }

            const summary = review.summary || 'No summary provided';
            const changes = (review.changes || []).map(c => `- ${c}`).join('\n');
            const feedbackCount = (review.feedback || []).length;

            const isRound1 = reviewRound === '1';
            const marker = isRound1 ? '<!-- CLAUDE_REVIEW_ROUND_1 -->' : '<!-- CLAUDE_REVIEW_ROUND_2_COMPLETE -->';
            const roundLabel = isRound1 ? 'Round 1' : 'Round 2 (Final)';

            let body = `## Claude Review - ${roundLabel}\n\n${marker}\n\n`;
            body += `### Summary\n${summary}\n\n`;
            body += `### Changes\n${changes}\n\n`;
            body += `---\n`;

            if (feedbackCount === 0) {
              body += `:white_check_mark: No issues found\n\n`;
            } else {
              body += `:mag: Found ${feedbackCount} suggestions (see inline comments)\n\n`;
            }

            const costLine = `${usage.input_tokens.toLocaleString()} in / ${usage.output_tokens.toLocaleString()} out | $${totalCost.toFixed(4)}`;
            if (isRound1) {
              body += `*Automated review by Claude Opus 4.6 - Round 1 of 2 | ${costLine}*`;
            } else {
              body += `*Automated review by Claude Opus 4.6 - Round 2 (Final) - No further reviews will be performed | ${costLine}*`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });

            if (feedbackCount > 0) {
              for (const item of review.feedback) {
                try {
                  await github.rest.pulls.createReviewComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    body: item.comment,
                    path: item.file,
                    line: item.line,
                    commit_id: headSha,
                    side: 'RIGHT'
                  });
                  console.log(`Posted comment on ${item.file}:${item.line}`);
                } catch (e) {
                  console.log(`Warning: Failed to post comment on ${item.file}:${item.line}:`, e.message);
                }
              }
            }
