name: CI/CD

# Orchestrator — wires reusable workflows. See
# tooling/templates/github/workflows/ci.yml for the canonical shape.
# Manual recovery from interrupted publish: publish-tag.yml (standalone).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  # `contents: write` porque _release.yml (reusable) precisa criar
  # commits e tags via semantic-release. Workflows reusáveis só
  # conseguem pedir permissões que o caller também concede.
  contents: write
  issues: write
  pull-requests: write
  deployments: write
  id-token: write
  # `models: read` pelo mesmo motivo: review.yml chama GitHub Models
  # via GITHUB_TOKEN no fallback de providers.
  models: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml
    secrets: inherit

  review:
    needs: checks
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/review.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  release:
    needs: checks
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/_release.yml
    secrets: inherit

  publish:
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/_publish.yml
    with:
      release_sha: ${{ needs.release.outputs.release_sha }}
      packages: |
        packages/dataset
        packages/eval-harness
    secrets: inherit

  deploy-site:
    needs: checks
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_deploy-site.yml
    with:
      project_name: medbench-brasil
      site_filter: '@medbench-brasil/site'
    secrets: inherit
