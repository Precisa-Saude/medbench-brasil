name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  deployments: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm turbo run build
      - name: Lint
        run: pnpm turbo run lint
      - name: Typecheck
        run: pnpm turbo run typecheck
      - name: Test
        run: pnpm turbo run test

  # ── PR only: Claude code review via Bedrock ─────────────────
  review:
    name: Code Review
    needs: build-and-test
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/review.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  # ── Release (main only, after checks pass, skip when no package changes) ──
  release:
    name: Release
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
    steps:
      - name: Check for package changes
        id: changes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });
            const packageChanged = commit.files?.some(
              f => f.filename.startsWith('packages/') || f.filename === 'package.json'
            );
            core.setOutput('packages_changed', packageChanged ? 'true' : 'false');

      - name: Generate GitHub App token
        id: app-token
        if: steps.changes.outputs.packages_changed == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        if: steps.changes.outputs.packages_changed == 'true'
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.packages_changed == 'true'

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.packages_changed == 'true'
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.changes.outputs.packages_changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.changes.outputs.packages_changed == 'true'
        run: pnpm turbo run build

      - name: Run semantic-release
        id: semantic
        if: steps.changes.outputs.packages_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          HUSKY: 0
        run: |
          OUTPUT=$(npx semantic-release 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Published release"; then
            VERSION=$(echo "$OUTPUT" | grep -oP "The next release version is \K[0-9]+\.[0-9]+\.[0-9]+")
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip release (site-only changes)
        if: steps.changes.outputs.packages_changed != 'true'
        run: echo "Somente alterações no site detectadas — release ignorado"

  # ── Publish to npm (only after release) ────────────────────
  publish:
    name: Publish to npm
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish_if_needed() {
            local dir="$1"
            local pkg_name pkg_version
            pkg_name=$(node -p "require('./$dir/package.json').name")
            pkg_version=$(node -p "require('./$dir/package.json').version")

            if npm view "$pkg_name@$pkg_version" version 2>/dev/null; then
              echo "Skipping $pkg_name@$pkg_version (already published)"
            else
              echo "Publishing $pkg_name@$pkg_version..."
              cd "$dir"
              pnpm publish --provenance --access public --no-git-checks
              cd "$GITHUB_WORKSPACE"
            fi
          }

          publish_if_needed packages/dataset
          publish_if_needed packages/eval-harness

  build-site:
    name: Build Site
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # `turbo run build --filter=<site>...` inclui as deps do workspace
      # (medbench-dataset, medbench-harness). Sem o `...`, o tsc do site
      # quebra por não achar os tipos/dist dos pacotes consumidos.
      - run: pnpm turbo run build --filter=@medbench-brasil/site...
      - uses: actions/upload-artifact@v6
        with:
          name: site-dist
          path: site/dist
          retention-days: 1

  deploy-site:
    name: Deploy Site
    needs: build-site
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: site-dist
          path: site/dist
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy site/dist --project-name=medbench-brasil --branch=main --commit-hash=${{ github.sha }} --commit-message="${{ github.sha }}"
      - name: Purge Cloudflare cache
        if: env.CLOUDFLARE_ZONE_ID != ''
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  # ── Slack notification after deploy (push to main only) ────
  notify:
    name: Notify
    needs: [build-and-test, build-site, deploy-site]
    if: always() && github.event_name != 'pull_request' && needs.deploy-site.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Build notification
        id: notify
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DEPLOY_RESULT="${{ needs.deploy-site.result }}"

          if [ "$DEPLOY_RESULT" = "success" ]; then
            HEADER=":rocket: medbench-brasil site deployed"
            RESULT_LINE=":white_check_mark: *Site* — deployed to Cloudflare Pages"
            TEXT="Deploy successful"
          else
            HEADER=":rotating_light: medbench-brasil site deploy failed"
            RESULT_LINE=":x: *Site* — deploy failed"
            TEXT="Deploy failed"
          fi

          cat > /tmp/slack-payload.json << PAYLOAD
          {
            "text": "${TEXT}",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "${HEADER}",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${RESULT_LINE}"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${SHORT_SHA}> | *Run:* <${RUN_URL}|View logs>"
                  }
                ]
              }
            ]
          }
          PAYLOAD

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
