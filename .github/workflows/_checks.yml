name: CI Checks

# Reusable workflow — parallel CI checks. Mirrors the canonical template
# in tooling/templates/github/workflows/_checks.yml with medbench-specific
# extras (sanity-check-raws + coverage artifact).

on:
  workflow_call:

jobs:
  commitlint-title:
    name: PR title (Conventional Commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | pnpm exec commitlint

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run typecheck

  format:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - run: pnpm turbo run test
      # Invariant ADR-0002: every run published to results/ must carry a
      # .raw.jsonl with exactly perQuestion.length × runsPerQuestion lines.
      # Without this the run isn't auditable or rescorable.
      - name: Sanity-check raw logs
        run: node scripts/sanity-check-raws.mjs

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Coverage is informational: thresholds (80% across branches/functions/
    # lines/statements) are declared in per-package vitest.config, but
    # known gaps exist (CLI, runner, dataset loaders). `continue-on-error`
    # lets the artifact land without blocking PRs — plugging the gaps is
    # tracked separately.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - run: pnpm turbo run test:coverage
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage
          path: |
            packages/*/coverage
          retention-days: 14
