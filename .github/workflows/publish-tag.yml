name: Publish tag to npm

# Recuperação manual: publica os pacotes de uma tag git específica no npm.
# Usado quando semantic-release criou a tag + commit chore(release) mas o
# step de publish foi interrompido (cancel de concorrência, npm fora do ar,
# rotação de token mid-release, etc.). Idempotente — só publica se a versão
# não estiver no registry.
#
# Uso: gh workflow run publish-tag.yml -f tag=v1.1.0

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag Git para publicar (ex.: v1.1.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Publish packages (idempotent)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # Mesma função `publish_if_needed` usada em ci.yml — checa se a versão
        # declarada em package.json já existe no npm e pula se sim. Permite
        # re-executar com segurança.
        run: |
          set -e
          publish_if_needed() {
            local dir="$1"
            local pkg_name pkg_version
            pkg_name=$(node -p "require('./$dir/package.json').name")
            pkg_version=$(node -p "require('./$dir/package.json').version")
            if npm view "$pkg_name@$pkg_version" version 2>/dev/null; then
              echo "Skipping $pkg_name@$pkg_version (already published)"
            else
              echo "Publishing $pkg_name@$pkg_version..."
              ( cd "$dir" && pnpm publish --provenance --access public --no-git-checks )
            fi
          }
          publish_if_needed packages/dataset
          publish_if_needed packages/eval-harness
